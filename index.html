<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pratyush Bindal</title>
        <link rel="stylesheet" href="style.css">
        <link href="images/favicon.ico" rel="icon" type="image/x-icon">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    </head>
    <body>
        <div id="header">
            <div class="container">
                <nav>
                    <img src="images/large.png" alt="logo" class="logo">
                    <ul id="sidemenu">
                        <li><a href="#home">Home</a></li>
                        <li><a href="#contact">Contact</a></li>
                        <i class="fas fa-times" onclick="closemenu()"></i> <!--For Mobile View-->
                    </ul>
                    <i class="fas fa-bars" onclick="openmenu()"></i>
                </nav>
                
                <div class="header-text">
                    <h1>
                        <span>PRATYUSH BINDAL</span><br>
                        CSE, BITS Pilani
                    </h1>
                    <a href="images/PratyushBindal_Resume.pdf" class="btn btn2">Resume</a>
                </div>
            </div>
        </div>
        
        
<!--Contact-->
        <div id="contact">
            <div class="container">
                <div class="row">
                    <div class="contact-left">
                        <h1 class="sub-title">Contact Me</h1>
                        <p><i class="fas fa-envelope"></i>pratyushbindal@hotmail.com</p>
                        <p><i class="fas fa-phone"></i>+91-9897086464</p>
                        <div class="social-icons">
                            <a href="https://www.linkedin.com/in/pratyushbindal/"><i class="fab fa-linkedin"></i></a>
                            <a href="https://x.com/PratyushBindal"><i class="fab fa-twitter"></i></a>
                            <a href="https://github.com/bPratyush"><i class="fab fa-github"></i></a>
                            <a href="https://www.instagram.com/pratyushbindal/?hl=en"><i class="fab fa-instagram"></i></a>
                        </div>

                    </div>
                    <div class="contact-right">
                        <form name="submit-to-google-sheet">
                            <input type="text" placeholder="Your Name" name="Name" required>
                            <input type="email" placeholder="Your Email" name="Email">
                            <input type="phone" placeholder="Your Phone" name="Phone">
                            <textarea rows="5" placeholder="Your Message" name="Message"></textarea>
                            <button type="submit" class="btn btn2">Send</button>
                        </form>
                        <span id="msg"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="copyright">
            <div class="container">
                <p>&copy; Made with <i class="fas fa-heart"></i> by Pratyush Bindal. All Rights Reserved.</p>
            </div>
        </div>
        
        <script>
            var sidemenu=document.getElementById('sidemenu');
            function openmenu(){
                sidemenu.style.right="0";
            }
            function closemenu(){
                sidemenu.style.right="-200px";
            }
        </script>
<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbwP5z2Jt1We8kiE-RiO5hWa18hCpTgOQzIfF1JNugCHowJHJZB1Omxo41hwNoFUe8Eq/exec'
  const form = document.forms['submit-to-google-sheet']
  const msg=document.getElementById('msg');
  form.addEventListener('submit', e => {
    e.preventDefault()
    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {msg.innerHTML="Thanks for Contacting Me"
        setTimeout(function(){
            msg.innerHTML="";
        },5000);
        form.reset();
        })
      .catch(error => console.error('Error!', error.message))
  })
</script>
    </body>
</html>
